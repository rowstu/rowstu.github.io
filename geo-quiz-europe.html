<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>European Countries Quiz // rowstu.net</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
	<style>
		:root {
			--bg-primary: #0f1318;
			--bg-surface: #171c24;
			--bg-elevated: #1e2530;
			--text-primary: #e2e8f0;
			--text-secondary: #8896a8;
			--text-muted: #5a6778;
			--border: #2a3444;
			--border-light: #3d4f66;
			--region-default: #2a3444;
			--region-hover: #3d4f66;
			--region-stroke: #0f1318;
			--region-active: #4a90d9;
			--region-correct: #2dd4a0;
			--region-wrong: #f0665c;
			--region-learned: #3b82c4;
			--accent: #2d7fc1;
			--accent-hover: #1e5f94;
			--accent-secondary: #3a6fa0;
			--modal-bg: rgba(0,0,0,0.7);
			--rg-northern: #5ba3cf;
			--rg-western: #e8a44a;
			--rg-eastern: #7ec87e;
			--rg-southern: #d4789c;
			--rg-southeastern: #6bc5b8;
			--rg-transcontinental: #b8a060;
			--topo-line: rgba(42, 52, 68, 0.12);
		}

		.light-theme {
			--bg-primary: #f0f2f5;
			--bg-surface: #ffffff;
			--bg-elevated: #e8ebef;
			--text-primary: #1a1d23;
			--text-secondary: #5f6672;
			--text-muted: #8b949e;
			--border: #d0d7de;
			--border-light: #b8bfc7;
			--region-default: #d0d7de;
			--region-hover: #b8c4d0;
			--region-stroke: #f0f2f5;
			--region-active: #3a7bc8;
			--region-correct: #1aab84;
			--region-wrong: #d94f45;
			--region-learned: #2d6da8;
			--accent: #1e6aaa;
			--accent-hover: #15507e;
			--accent-secondary: #3a7bc8;
			--modal-bg: rgba(0,0,0,0.4);
			--rg-northern: #3a7bc8;
			--rg-western: #c47c28;
			--rg-eastern: #4aaa4a;
			--rg-southern: #c05a7a;
			--rg-southeastern: #3aaa9a;
			--rg-transcontinental: #9a8840;
			--topo-line: rgba(42, 52, 68, 0.06);
		}
		* { margin: 0; padding: 0; box-sizing: border-box; }

		body {
			font-family: 'DM Sans', sans-serif;
			background: var(--bg-primary);
			color: var(--text-primary);
			min-height: 100vh;
			background-image:
				repeating-linear-gradient(0deg, transparent, transparent 40px, var(--topo-line) 40px, var(--topo-line) 41px),
				repeating-linear-gradient(90deg, transparent, transparent 40px, var(--topo-line) 40px, var(--topo-line) 41px);
		}

		h1, h2, h3 { font-family: 'Playfair Display', serif; }

		.app-header {
			padding: 1rem 1.5rem;
			display: flex;
			align-items: center;
			justify-content: space-between;
			gap: 1rem;
			flex-wrap: wrap;
			border-bottom: 1px solid var(--border);
			background: var(--bg-surface);
		}

		.app-title {
			font-size: 1.5rem;
			font-weight: 800;
			color: var(--accent);
			letter-spacing: -0.02em;
		}

		.app-title span { color: var(--text-secondary); font-weight: 400; font-size: 0.9rem; }

		.header-controls {
			display: flex;
			align-items: center;
			gap: 0.75rem;
		}

		.mode-select {
			background: var(--bg-elevated);
			color: var(--text-primary);
			border: 1px solid var(--border);
			border-radius: 6px;
			padding: 0.5rem 0.75rem;
			font-family: 'DM Sans', sans-serif;
			font-size: 0.85rem;
			cursor: pointer;
			outline: none;
		}

		.mode-select:focus { border-color: var(--accent); }

		.theme-btn, .reset-btn {
			background: var(--bg-elevated);
			color: var(--text-secondary);
			border: 1px solid var(--border);
			border-radius: 6px;
			padding: 0.45rem 0.65rem;
			font-size: 1rem;
			cursor: pointer;
			transition: all 0.2s;
		}

		.theme-btn:hover, .reset-btn:hover {
			border-color: var(--accent);
			color: var(--accent);
		}

		.stats-bar {
			display: flex;
			gap: 1.5rem;
			padding: 0.6rem 1.5rem;
			background: var(--bg-surface);
			border-bottom: 1px solid var(--border);
			font-size: 0.8rem;
			color: var(--text-secondary);
			flex-wrap: wrap;
		}

		.stat-item { display: flex; gap: 0.4rem; align-items: center; }
		.stat-value { color: var(--accent); font-weight: 600; }
		.stat-label { color: var(--text-muted); }

		.app-layout {
			display: flex;
			min-height: calc(100vh - 130px);
		}

		.map-panel {
			flex: 3;
			position: relative;
			padding: 0;
			overflow: hidden;
		}

		.map-panel.dragging {
			cursor: grabbing;
			user-select: none;
		}

		.map-container {
			width: 100%;
			height: 100%;
			display: flex;
			justify-content: center;
			align-items: center;
		}

		#quiz-map {
			width: 100%;
			height: 100%;
		}

		#quiz-map path {
			fill: var(--region-default);
			stroke: var(--region-stroke);
			stroke-width: 0.8;
			cursor: pointer;
			transition: fill 0.2s, opacity 0.2s;
		}

		#quiz-map path:hover {
			fill: var(--region-hover);
			filter: brightness(1.15);
		}

		#quiz-map path.highlighted {
			fill: var(--region-active);
			animation: regionPulse 1.5s ease-in-out infinite;
		}

		#quiz-map path.correct {
			fill: var(--region-correct) !important;
			animation: correctFlash 0.5s ease;
		}

		#quiz-map path.wrong {
			fill: var(--region-wrong) !important;
			animation: wrongShake 0.4s ease;
		}

		#quiz-map path.learned {
			fill: var(--region-learned);
			opacity: 0.6;
		}

		#quiz-map path.dimmed {
			opacity: 0.3;
		}

		#quiz-map path.group-colored {
			stroke: var(--region-stroke);
			stroke-width: 0.8;
		}

		@keyframes regionPulse {
			0%, 100% { opacity: 0.75; }
			50% { opacity: 1; filter: brightness(1.25); }
		}

		@keyframes correctFlash {
			0% { fill: #fff; }
			100% { fill: var(--region-correct); }
		}

		@keyframes wrongShake {
			0%, 100% { transform: translateX(0); }
			20% { transform: translateX(-2px); }
			40% { transform: translateX(2px); }
			60% { transform: translateX(-2px); }
			80% { transform: translateX(2px); }
		}

		.quiz-panel {
			flex: 2;
			padding: 1.5rem;
			border-left: 1px solid var(--border);
			background: var(--bg-surface);
			display: flex;
			flex-direction: column;
			gap: 1rem;
			max-width: 400px;
		}

		.quiz-question {
			font-family: 'Playfair Display', serif;
			font-size: 1.3rem;
			font-weight: 700;
			color: var(--text-primary);
			min-height: 2.5rem;
		}

		.quiz-instruction {
			font-size: 0.85rem;
			color: var(--text-muted);
			font-style: italic;
		}

		.quiz-options {
			display: grid;
			grid-template-columns: 1fr 1fr;
			gap: 0.6rem;
		}

		.quiz-option {
			background: var(--bg-elevated);
			border: 1px solid var(--border);
			border-radius: 8px;
			padding: 0.75rem;
			color: var(--text-primary);
			font-family: 'DM Sans', sans-serif;
			font-size: 0.85rem;
			cursor: pointer;
			transition: all 0.2s;
			text-align: center;
		}

		.quiz-option:hover {
			border-color: var(--accent);
			background: var(--bg-surface);
		}

		.quiz-option.correct {
			background: rgba(45, 212, 160, 0.15);
			border-color: var(--region-correct);
			color: var(--region-correct);
		}

		.quiz-option.wrong {
			background: rgba(240, 102, 92, 0.15);
			border-color: var(--region-wrong);
			color: var(--region-wrong);
		}

		.quiz-option:disabled { cursor: default; }

		.quiz-feedback {
			font-size: 0.9rem;
			font-weight: 500;
			min-height: 1.4rem;
			transition: opacity 0.2s;
		}

		.quiz-feedback.success { color: var(--region-correct); }
		.quiz-feedback.error { color: var(--region-wrong); }

		.quiz-next-btn {
			background: var(--accent);
			color: #0f1318;
			border: none;
			border-radius: 8px;
			padding: 0.7rem 1.5rem;
			font-family: 'DM Sans', sans-serif;
			font-size: 0.9rem;
			font-weight: 600;
			cursor: pointer;
			transition: background 0.2s;
			align-self: flex-start;
		}

		.quiz-next-btn:hover { background: var(--accent-hover); }

		.info-card {
			background: var(--bg-elevated);
			border: 1px solid var(--border);
			border-radius: 10px;
			padding: 1.25rem;
		}

		.info-card h3 {
			font-size: 1.1rem;
			color: var(--accent);
			margin-bottom: 0.5rem;
		}

		.info-card .info-row {
			display: flex;
			justify-content: space-between;
			padding: 0.3rem 0;
			font-size: 0.85rem;
			border-bottom: 1px solid var(--border);
		}

		.info-card .info-row:last-child { border-bottom: none; }
		.info-card .info-label { color: var(--text-muted); }
		.info-card .info-value { color: var(--text-primary); font-weight: 500; }

		.info-card .info-fact {
			margin-top: 0.75rem;
			font-size: 0.85rem;
			color: var(--text-secondary);
			line-height: 1.5;
			font-style: italic;
		}

		.progress-bar {
			width: 100%;
			height: 6px;
			background: var(--bg-elevated);
			border-radius: 3px;
			overflow: hidden;
		}

		.progress-fill {
			height: 100%;
			background: var(--accent);
			border-radius: 3px;
			transition: width 0.3s ease;
		}

		.timer-display {
			font-family: 'Playfair Display', serif;
			font-size: 2.5rem;
			font-weight: 800;
			text-align: center;
			color: var(--accent);
			transition: color 0.3s;
		}

		.timer-display.warning { color: var(--rg-southern); }
		.timer-display.danger { color: var(--region-wrong); }

		.speed-score {
			font-size: 3rem;
			font-weight: 800;
			font-family: 'Playfair Display', serif;
			text-align: center;
			color: var(--accent);
		}

		.score-float {
			position: absolute;
			font-size: 1.2rem;
			font-weight: 700;
			color: var(--region-correct);
			pointer-events: none;
			animation: floatUp 0.8s ease-out forwards;
			z-index: 10;
		}

		@keyframes floatUp {
			0% { opacity: 1; transform: translateY(0); }
			100% { opacity: 0; transform: translateY(-30px); }
		}

		.legend {
			display: flex;
			flex-wrap: wrap;
			gap: 0.5rem;
			padding: 0.75rem;
		}

		.legend-item {
			display: flex;
			align-items: center;
			gap: 0.35rem;
			font-size: 0.7rem;
			color: var(--text-muted);
			cursor: pointer;
			padding: 0.2rem 0.4rem;
			border-radius: 4px;
			transition: background 0.2s;
		}

		.legend-item:hover { background: var(--bg-elevated); }

		.legend-swatch {
			width: 10px;
			height: 10px;
			border-radius: 2px;
		}

		.start-screen {
			text-align: center;
			padding: 2rem;
		}

		.start-screen h2 {
			font-size: 1.5rem;
			color: var(--accent);
			margin-bottom: 0.5rem;
		}

		.start-screen p {
			color: var(--text-secondary);
			margin-bottom: 1.5rem;
		}

		.start-btn {
			background: var(--accent);
			color: #0f1318;
			border: none;
			border-radius: 8px;
			padding: 0.8rem 2rem;
			font-family: 'DM Sans', sans-serif;
			font-size: 1rem;
			font-weight: 600;
			cursor: pointer;
			transition: background 0.2s;
		}

		.start-btn:hover { background: var(--accent-hover); }

		.zoom-controls {
			position: absolute;
			bottom: 1rem;
			right: 1rem;
			display: flex;
			flex-direction: column;
			gap: 0.3rem;
			z-index: 5;
		}

		.zoom-btn {
			background: var(--bg-surface);
			border: 1px solid var(--border);
			color: var(--text-secondary);
			width: 32px;
			height: 32px;
			border-radius: 6px;
			font-size: 1rem;
			cursor: pointer;
			display: flex;
			align-items: center;
			justify-content: center;
			transition: all 0.2s;
		}

		.zoom-btn:hover { border-color: var(--accent); color: var(--accent); }

		.map-tooltip {
			position: absolute;
			background: var(--bg-surface);
			border: 1px solid var(--border);
			border-radius: 6px;
			padding: 0.4rem 0.7rem;
			font-size: 0.75rem;
			color: var(--text-primary);
			pointer-events: none;
			opacity: 0;
			transition: opacity 0.15s;
			z-index: 10;
			white-space: nowrap;
		}

		.map-tooltip.visible { opacity: 1; }

		.end-screen {
			text-align: center;
			padding: 2rem 1rem;
		}

		.end-screen h2 {
			font-size: 1.8rem;
			color: var(--accent);
			margin-bottom: 0.5rem;
		}

		.end-stats {
			display: grid;
			grid-template-columns: 1fr 1fr;
			gap: 0.75rem;
			margin: 1.5rem 0;
		}

		.end-stat {
			background: var(--bg-elevated);
			border-radius: 8px;
			padding: 0.75rem;
		}

		.end-stat-value {
			font-size: 1.5rem;
			font-weight: 700;
			font-family: 'Playfair Display', serif;
			color: var(--accent);
		}

		.end-stat-label {
			font-size: 0.75rem;
			color: var(--text-muted);
			margin-top: 0.25rem;
		}

		@media (max-width: 768px) {
			.app-layout { flex-direction: column; }
			.quiz-panel {
				max-width: none;
				border-left: none;
				border-top: 1px solid var(--border);
			}
			.map-panel { min-height: 40vh; max-height: 55vh; }
			.app-title { font-size: 1.2rem; }
			.app-header { padding: 0.75rem 1rem; }
		}

		@media (max-width: 480px) {
			.quiz-options { grid-template-columns: 1fr; }
			.stats-bar { gap: 0.75rem; font-size: 0.75rem; padding: 0.5rem 1rem; }
			.quiz-question { font-size: 1.1rem; }
			.header-controls { gap: 0.5rem; }
			.mode-select { font-size: 0.8rem; padding: 0.4rem 0.5rem; }
		}
		</style>
</head>
<body>

		<h1 class="app-title">European Countries Quiz <span>// 49 countries</span></h1>
		<div class="header-controls">
			<select class="mode-select" id="mode-select">
				<option value="learn">Learn</option>
				<option value="find">Find It</option>
				<option value="name">Name It</option>
				<option value="speed">Speed Round</option>
			</select>
			<button class="theme-btn" id="theme-btn" title="Toggle theme">&#9790;</button>
		</div>
	</div>

	<div class="stats-bar" id="stats-bar">
		<div class="stat-item"><span class="stat-label">Score:</span> <span class="stat-value" id="stat-score">0</span></div>
		<div class="stat-item"><span class="stat-label">Streak:</span> <span class="stat-value" id="stat-streak">0</span></div>
		<div class="stat-item"><span class="stat-label">Best:</span> <span class="stat-value" id="stat-best">0</span></div>
		<div class="stat-item"><span class="stat-label">Accuracy:</span> <span class="stat-value" id="stat-accuracy">-</span></div>

	const GROUPS = {
		northern:       { label: 'Northern Europe',      color: 'var(--rg-northern)' },
		western:        { label: 'Western Europe',       color: 'var(--rg-western)' },
		eastern:        { label: 'Eastern Europe',       color: 'var(--rg-eastern)' },
		southern:       { label: 'Southern Europe',      color: 'var(--rg-southern)' },
		southeastern:   { label: 'Southeastern Europe',  color: 'var(--rg-southeastern)' },
		transcontinental: { label: 'Transcontinental',    color: 'var(--rg-transcontinental)' },
	};

	const App = {
		mode: 'learn',
		current: null,
		answered: false,
		score: 0,
		total: 0,
		streak: 0,
		speedScore: 0,
		speedTimer: null,
		speedTimeLeft: 60,
		used: new Set(),
		prefs: { theme:'dark', mode:'learn', bestStreak:0, speedBest:0, findCorrect:0, findTotal:0, nameCorrect:0, nameTotal:0, learned:[] },

		init() {
			this.loadPrefs();
			this.buildLegend();
			this.bindEvents();
			const savedMode = this.prefs.mode || 'learn';
			document.getElementById('mode-select').value = savedMode;
			this.setMode(savedMode);
			this.updateThemeBtn();
			if (this.prefs.theme === 'light') document.body.classList.add('light-theme');
		},

		loadPrefs() {
			try {
				const s = localStorage.getItem('geoQuizEurope');
				if (s) Object.assign(this.prefs, JSON.parse(s));
			} catch {}
		},

		savePrefs() {
			try { localStorage.setItem('geoQuizEurope', JSON.stringify(this.prefs)); } catch {}
		},

		bindEvents() {
			document.getElementById('mode-select').addEventListener('change', (e) => this.setMode(e.target.value));
			document.getElementById('theme-btn').addEventListener('click', () => this.toggleTheme());

			const svg = document.getElementById('quiz-map');
			const mapPanel = document.getElementById('map-panel');
			svg.addEventListener('mousemove', (e) => this.handleMapHover(e));
			svg.addEventListener('mouseleave', () => this.hideTooltip());
			svg.addEventListener('click', (e) => this.handleMapClick(e));

			// Zoom & pan via SVG viewBox manipulation
			const origVB = svg.getAttribute('viewBox').split(' ').map(Number);
			let vb = { x: origVB[0], y: origVB[1], w: origVB[2], h: origVB[3] };

			const applyViewBox = () => {
				svg.setAttribute('viewBox', `${vb.x} ${vb.y} ${vb.w} ${vb.h}`);
			};

			const zoomBy = (factor, cx, cy) => {
				// cx, cy are the center point in viewBox coords to zoom towards
				const newW = Math.max(origVB[2] * 0.1, Math.min(origVB[2] * 3, vb.w * factor));
				const newH = Math.max(origVB[3] * 0.1, Math.min(origVB[3] * 3, vb.h * factor));
				// Adjust origin so zoom centers on cx,cy
				vb.x = cx - (cx - vb.x) * (newW / vb.w);
				vb.y = cy - (cy - vb.y) * (newH / vb.h);
				vb.w = newW;
				vb.h = newH;
				applyViewBox();
			};

			const svgPoint = (clientX, clientY) => {
				const rect = svg.getBoundingClientRect();
				return {
					x: vb.x + (clientX - rect.left) / rect.width * vb.w,
					y: vb.y + (clientY - rect.top) / rect.height * vb.h
				};
			};

			// Zoom buttons (zoom toward center of current view)
			document.getElementById('zoom-in').addEventListener('click', () => {
				zoomBy(0.7, vb.x + vb.w / 2, vb.y + vb.h / 2);
			});
			document.getElementById('zoom-out').addEventListener('click', () => {
				zoomBy(1.4, vb.x + vb.w / 2, vb.y + vb.h / 2);
			});
			document.getElementById('zoom-reset').addEventListener('click', () => {
				vb = { x: origVB[0], y: origVB[1], w: origVB[2], h: origVB[3] };
				applyViewBox();
			});

			// Mouse wheel zoom (zoom toward cursor)
			mapPanel.addEventListener('wheel', (e) => {
				e.preventDefault();
				const pt = svgPoint(e.clientX, e.clientY);
				const factor = e.deltaY > 0 ? 1.15 : 0.85;
				zoomBy(factor, pt.x, pt.y);
			}, { passive: false });

			// Click-drag to pan
			let isDragging = false, dragStart = { x: 0, y: 0 }, vbStart = { x: 0, y: 0 };
			mapPanel.addEventListener('mousedown', (e) => {
				if (e.target.closest('.zoom-controls')) return;
				isDragging = true;
				dragStart = { x: e.clientX, y: e.clientY };
				vbStart = { x: vb.x, y: vb.y };
				mapPanel.classList.add('dragging');
				e.preventDefault();
			});
			window.addEventListener('mousemove', (e) => {
				if (!isDragging) return;
				const rect = svg.getBoundingClientRect();
				const dx = (e.clientX - dragStart.x) / rect.width * vb.w;
				const dy = (e.clientY - dragStart.y) / rect.height * vb.h;
				vb.x = vbStart.x - dx;
				vb.y = vbStart.y - dy;
				applyViewBox();
			});
			window.addEventListener('mouseup', () => {
				isDragging = false;
				mapPanel.classList.remove('dragging');
			});
		},

		toggleTheme() {
			this.prefs.theme = this.prefs.theme === 'dark' ? 'light' : 'dark';
			document.body.classList.toggle('light-theme', this.prefs.theme === 'light');
			this.updateThemeBtn();
			this.savePrefs();
		},

		updateThemeBtn() {
			document.getElementById('theme-btn').innerHTML = this.prefs.theme === 'dark' ? '&#9790;' : '&#9788;';
		},

		setMode(mode) {
			this.mode = mode;
			this.prefs.mode = mode;
			this.savePrefs();
			this.score = 0;
			this.total = 0;
			this.streak = 0;
			this.used.clear();
			this.clearMapStates();
			this.stopSpeed();

			if (mode === 'learn') this.showLearn();
			else if (mode === 'find') this.showFindStart();
			else if (mode === 'name') this.showNameStart();
			else if (mode === 'speed') this.showSpeedStart();

			this.updateStats();
			if (mode === 'learn') this.colorByGroup();
		},

		clearMapStates() {
			document.querySelectorAll('#quiz-map path').forEach(p => {
				p.classList.remove('highlighted', 'correct', 'wrong', 'learned', 'dimmed', 'group-colored');
				p.style.fill = '';
			});
		},

		colorByGroup() {
			document.querySelectorAll('#quiz-map path').forEach(el => {
				const r = REGIONS.find(r => r.id === el.id);
				if (r && GROUPS[r.group]) {
					el.style.fill = GROUPS[r.group].color;
					el.classList.add('group-colored');
					if (this.prefs.learned.includes(r.id)) {
						el.style.opacity = '1';
					} else {
						el.style.opacity = '0.55';
					}
				}
			});
		},

		buildLegend() {
			const legend = document.getElementById('legend');
			legend.innerHTML = '';
			for (const [key, g] of Object.entries(GROUPS)) {
				const item = document.createElement('div');
				item.className = 'legend-item';
				item.innerHTML = `<span class="legend-swatch" style="background:${g.color}"></span>${g.label}`;
				legend.appendChild(item);
			}
		},

		// --- TOOLTIP ---
		handleMapHover(e) {
			if (this.mode !== 'learn') { this.hideTooltip(); return; }
			if (e.target.tagName !== 'path') { this.hideTooltip(); return; }
			const r = REGIONS.find(r => r.id === e.target.id);
			if (!r) { this.hideTooltip(); return; }

			const tip = document.getElementById('map-tooltip');
			tip.textContent = r.name;
			tip.classList.add('visible');

			const panel = document.getElementById('map-panel');
			const rect = panel.getBoundingClientRect();
			tip.style.left = (e.clientX - rect.left + 12) + 'px';
			tip.style.top = (e.clientY - rect.top - 10) + 'px';
		},

		hideTooltip() {
			document.getElementById('map-tooltip').classList.remove('visible');
		},

		// --- MAP CLICK ---
		handleMapClick(e) {
			if (e.target.tagName !== 'path') return;
			const r = REGIONS.find(r => r.id === e.target.id);
			if (!r) return;

			if (this.mode === 'learn') this.learnClick(r);
			else if (this.mode === 'find' && !this.answered) this.findClick(r);
			else if (this.mode === 'speed' && this.speedTimer) this.speedClick(r);
		},

		// --- LEARN MODE ---
		showLearn() {
			const explored = this.prefs.learned.length;
			const pct = Math.round((explored / REGIONS.length) * 100);
			document.getElementById('quiz-content').innerHTML = `
				<h2 style="font-size:1.2rem;color:var(--accent)">Learn Mode</h2>
				<p class="quiz-instruction">Click any country on the map to learn about it.</p>
				<div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
				<p style="font-size:0.8rem;color:var(--text-muted)">${explored}/${REGIONS.length} explored (${pct}%)</p>
				<div id="learn-info"></div>
			`;
		},

		learnClick(r) {
			if (!this.prefs.learned.includes(r.id)) {
				this.prefs.learned.push(r.id);
				this.savePrefs();
			}

			this.colorByGroup();

			const el = document.getElementById(r.id);
			if (el) { el.style.opacity = '1'; el.style.filter = 'brightness(1.3)'; setTimeout(() => el.style.filter = '', 300); }

			const explored = this.prefs.learned.length;
			const pct = Math.round((explored / REGIONS.length) * 100);

			document.getElementById('learn-info').innerHTML = `
				<div class="info-card" style="margin-top:0.75rem">
					<h3>${r.name}</h3>
					<div class="info-row"><span class="info-label">Capital</span><span class="info-value">${r.capital}</span></div>
					<div class="info-row"><span class="info-label">Region</span><span class="info-value">${GROUPS[r.group].label}</span></div>
					<div class="info-fact">${r.fact}</div>
				</div>
			`;

			const bar = document.querySelector('.progress-fill');
			if (bar) bar.style.width = pct + '%';
			const counter = document.querySelector('.progress-bar + p');
			if (counter) counter.textContent = `${explored}/${REGIONS.length} explored (${pct}%)`;
		},

		// --- FIND IT MODE ---
		showFindStart() {
			document.getElementById('quiz-content').innerHTML = `
				<div class="start-screen">
					<h2>Find It</h2>
					<p>A country name will appear. Click it on the map!</p>
					<button class="start-btn" onclick="App.nextFind()">Start</button>
				</div>
			`;
		},

		nextFind() {
			this.answered = false;
			this.clearMapStates();

			if (this.used.size >= REGIONS.length) this.used.clear();
			let r;
			do { r = REGIONS[Math.floor(Math.random() * REGIONS.length)]; } while (this.used.has(r.id));
			this.used.add(r.id);
			this.current = r;

			document.getElementById('quiz-content').innerHTML = `
				<div class="quiz-question">Find: ${r.name}</div>
				<p class="quiz-instruction">Click the correct country on the map</p>
				<div class="quiz-feedback" id="quiz-feedback"></div>
			`;
		},

		findClick(r) {
			this.answered = true;
			this.total++;
			this.prefs.findTotal++;
			const correct = r.id === this.current.id;

			if (correct) {
				this.score++;
				this.streak++;
				this.prefs.findCorrect++;
				if (this.streak > this.prefs.bestStreak) this.prefs.bestStreak = this.streak;
				document.getElementById(r.id).classList.add('correct');
				document.getElementById('quiz-feedback').className = 'quiz-feedback success';
				document.getElementById('quiz-feedback').textContent = this.streak > 1 ? `Correct! ${this.streak} streak` : 'Correct!';
				this.showFloatingScore(r.id);
			} else {
				this.streak = 0;
				document.getElementById(r.id).classList.add('wrong');
				document.getElementById(this.current.id).classList.add('correct');
				document.getElementById('quiz-feedback').className = 'quiz-feedback error';
				document.getElementById('quiz-feedback').textContent = `That was ${r.name}. The answer was ${this.current.name}.`;
			}

			this.savePrefs();
			this.updateStats();

			setTimeout(() => {
				const content = document.getElementById('quiz-content');
				if (!content.querySelector('.quiz-next-btn')) {
					const btn = document.createElement('button');
					btn.className = 'quiz-next-btn';
					btn.textContent = 'Next';
					btn.onclick = () => this.nextFind();
					content.appendChild(btn);
				}
			}, 300);
		},

		// --- NAME IT MODE ---
		showNameStart() {
			document.getElementById('quiz-content').innerHTML = `
				<div class="start-screen">
					<h2>Name It</h2>
					<p>A country will be highlighted. Pick its name!</p>
					<button class="start-btn" onclick="App.nextName()">Start</button>
				</div>
			`;
		},

		nextName() {
			this.answered = false;
			this.clearMapStates();

			if (this.used.size >= REGIONS.length) this.used.clear();
			let r;
			do { r = REGIONS[Math.floor(Math.random() * REGIONS.length)]; } while (this.used.has(r.id));
			this.used.add(r.id);
			this.current = r;

			document.getElementById(r.id).classList.add('highlighted');

			const wrongs = this.pickWrong(r, 3);
			const options = this.shuffle([r, ...wrongs]);

			document.getElementById('quiz-content').innerHTML = `
				<div class="quiz-question">Name this country</div>
				<p class="quiz-instruction">The highlighted country on the map is...</p>
				<div class="quiz-options" id="quiz-options">
					${options.map(o => `<button class="quiz-option" data-id="${o.id}">${o.name}</button>`).join('')}
				</div>
				<div class="quiz-feedback" id="quiz-feedback"></div>
			`;

			document.querySelectorAll('.quiz-option').forEach(btn => {
				btn.addEventListener('click', () => this.nameAnswer(btn));
			});
		},

		nameAnswer(btn) {
			if (this.answered) return;
			this.answered = true;
			this.total++;
			this.prefs.nameTotal++;
			const correct = btn.dataset.id === this.current.id;

			document.querySelectorAll('.quiz-option').forEach(b => {
				b.disabled = true;
				if (b.dataset.id === this.current.id) b.classList.add('correct');
			});

			if (correct) {
				this.score++;
				this.streak++;
				this.prefs.nameCorrect++;
				if (this.streak > this.prefs.bestStreak) this.prefs.bestStreak = this.streak;
				document.getElementById(this.current.id).classList.remove('highlighted');
				document.getElementById(this.current.id).classList.add('correct');
				document.getElementById('quiz-feedback').className = 'quiz-feedback success';
				document.getElementById('quiz-feedback').textContent = this.streak > 1 ? `Correct! ${this.streak} streak` : 'Correct!';
			} else {
				this.streak = 0;
				btn.classList.add('wrong');
				document.getElementById(this.current.id).classList.remove('highlighted');
				document.getElementById(this.current.id).classList.add('correct');
				document.getElementById('quiz-feedback').className = 'quiz-feedback error';
				document.getElementById('quiz-feedback').textContent = `The answer was ${this.current.name}`;
			}

			this.savePrefs();
			this.updateStats();

			setTimeout(() => {
				const nextBtn = document.createElement('button');
				nextBtn.className = 'quiz-next-btn';
				nextBtn.textContent = 'Next';
				nextBtn.onclick = () => this.nextName();
				document.getElementById('quiz-content').appendChild(nextBtn);
			}, 300);
		},

		// --- SPEED ROUND ---
		showSpeedStart() {
			document.getElementById('quiz-content').innerHTML = `
				<div class="start-screen">
					<h2>Speed Round</h2>
					<p>60 seconds. Find as many countries as you can!</p>
					<p style="font-size:0.85rem;color:var(--text-muted)">Best: ${this.prefs.speedBest}</p>
					<button class="start-btn" onclick="App.startSpeed()">Go!</button>
				</div>
			`;
		},

		startSpeed() {
			this.speedScore = 0;
			this.speedTimeLeft = 60;
			this.used.clear();
			this.clearMapStates();
			this.nextSpeedQuestion();

			this.speedTimer = setInterval(() => {
				this.speedTimeLeft--;
				this.updateSpeedDisplay();
				if (this.speedTimeLeft <= 0) this.endSpeed();
			}, 1000);
		},

		nextSpeedQuestion() {
			if (this.used.size >= REGIONS.length) this.used.clear();
			let r;
			do { r = REGIONS[Math.floor(Math.random() * REGIONS.length)]; } while (this.used.has(r.id));
			this.used.add(r.id);
			this.current = r;
			this.updateSpeedDisplay();
		},

		updateSpeedDisplay() {
			const cls = this.speedTimeLeft <= 10 ? 'danger' : this.speedTimeLeft <= 20 ? 'warning' : '';
			document.getElementById('quiz-content').innerHTML = `
				<div class="timer-display ${cls}">${this.speedTimeLeft}s</div>
				<div class="quiz-question" style="text-align:center;margin:1rem 0">Find: ${this.current.name}</div>
				<div style="text-align:center;font-size:2rem;font-family:'Playfair Display',serif;font-weight:700;color:var(--accent)">${this.speedScore}</div>
				<p style="text-align:center;font-size:0.8rem;color:var(--text-muted)">correct answers</p>
			`;
		},

		speedClick(r) {
			if (r.id === this.current.id) {
				this.speedScore++;
				document.getElementById(r.id).classList.add('correct');
				this.showFloatingScore(r.id);
				setTimeout(() => {
					document.getElementById(r.id).classList.remove('correct');
				}, 400);
				this.nextSpeedQuestion();
			} else {
				document.getElementById(r.id).classList.add('wrong');
				setTimeout(() => document.getElementById(r.id).classList.remove('wrong'), 400);
			}
		},

		endSpeed() {
			this.stopSpeed();
			if (this.speedScore > this.prefs.speedBest) {
				this.prefs.speedBest = this.speedScore;
				this.savePrefs();
			}

			document.getElementById('quiz-content').innerHTML = `
				<div class="end-screen">
					<h2>Time\'s Up!</h2>
					<div class="end-stats">
						<div class="end-stat"><div class="end-stat-value">${this.speedScore}</div><div class="end-stat-label">Score</div></div>
						<div class="end-stat"><div class="end-stat-value">${this.prefs.speedBest}</div><div class="end-stat-label">Best</div></div>
					</div>
					${this.speedScore >= this.prefs.speedBest ? '<p style="color:var(--region-correct);font-weight:600;margin-bottom:1rem">New personal best!</p>' : ''}
					<button class="start-btn" onclick="App.startSpeed()">Play Again</button>
				</div>
			`;
		},

		stopSpeed() {
			if (this.speedTimer) { clearInterval(this.speedTimer); this.speedTimer = null; }
		},

		// --- UTILITIES ---
		pickWrong(correct, count) {
			const pool = REGIONS.filter(r => r.id !== correct.id);
			const result = [];
			while (result.length < count && pool.length > 0) {
				const idx = Math.floor(Math.random() * pool.length);
				result.push(pool.splice(idx, 1)[0]);
			}
			return result;
		},

		shuffle(arr) {
			const a = [...arr];
			for (let i = a.length - 1; i > 0; i--) {
				const j = Math.floor(Math.random() * (i + 1));
				[a[i], a[j]] = [a[j], a[i]];
			}
			return a;
		},

		showFloatingScore(regionId) {
			const el = document.getElementById(regionId);
			if (!el) return;
			const rect = el.getBoundingClientRect();
			const panel = document.getElementById('map-panel').getBoundingClientRect();
			const float = document.createElement('div');
			float.className = 'score-float';
			float.textContent = '+1';
			float.style.left = (rect.left - panel.left + rect.width / 2) + 'px';
			float.style.top = (rect.top - panel.top) + 'px';
			document.getElementById('map-panel').appendChild(float);
			setTimeout(() => float.remove(), 800);
		},

		updateStats() {
			document.getElementById('stat-score').textContent = this.score;
			document.getElementById('stat-streak').textContent = this.streak;
			document.getElementById('stat-best').textContent = this.prefs.bestStreak;
			const acc = this.total > 0 ? Math.round((this.score / this.total) * 100) + '%' : '-';
			document.getElementById('stat-accuracy').textContent = acc;
		},
	};

	document.addEventListener('DOMContentLoaded', () => App.init());
	</script>
</body>
</html>
