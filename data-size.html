<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Data Size Converter</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
	<style>
		:root {
			--bg: #111418;
			--surface: #191d24;
			--surface2: #20252f;
			--border: #2d3542;
			--text: #dde3ee;
			--muted: #7a8799;
			--accent: #f59e0b;
			--accent2: #fcd34d;
			--accent3: #fb923c;
			--highlight: #1c2233;
		}

		* { margin: 0; padding: 0; box-sizing: border-box; }

		body {
			font-family: 'Exo 2', sans-serif;
			background: var(--bg);
			color: var(--text);
			min-height: 100vh;
			padding: 1.5rem;
		}

		.container { max-width: 820px; margin: 0 auto; }

		header {
			margin-bottom: 2rem;
			padding-bottom: 1.5rem;
			border-bottom: 1px solid var(--border);
			display: flex;
			justify-content: space-between;
			align-items: flex-end;
			flex-wrap: wrap;
			gap: 1rem;
		}

		h1 {
			font-size: 1.8rem;
			font-weight: 700;
			color: var(--accent);
			letter-spacing: -0.3px;
		}

		.subtitle { color: var(--muted); font-size: 0.85rem; margin-top: 0.2rem; }

		.mode-tabs {
			display: flex;
			background: var(--surface);
			border: 1px solid var(--border);
			border-radius: 6px;
			overflow: hidden;
		}

		.mode-tab {
			padding: 0.5rem 1.25rem;
			font-family: 'Exo 2', sans-serif;
			font-size: 0.85rem;
			font-weight: 600;
			background: none;
			border: none;
			color: var(--muted);
			cursor: pointer;
			transition: all 0.2s;
		}

		.mode-tab.active {
			background: var(--accent);
			color: #111;
		}

		.input-row {
			display: flex;
			gap: 0.75rem;
			margin-bottom: 2rem;
			align-items: stretch;
		}

		.input-wrap {
			flex: 1;
			background: var(--surface);
			border: 1px solid var(--border);
			border-radius: 8px;
			overflow: hidden;
			display: flex;
			transition: border-color 0.2s;
		}

		.input-wrap:focus-within { border-color: var(--accent); }

		input[type="number"] {
			flex: 1;
			background: none;
			border: none;
			outline: none;
			color: var(--text);
			font-family: 'Share Tech Mono', monospace;
			font-size: 1.4rem;
			padding: 0.75rem 1rem;
			width: 0;
		}

		input[type="number"]::-webkit-inner-spin-button,
		input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

		select {
			background: var(--surface2);
			border: none;
			border-left: 1px solid var(--border);
			outline: none;
			color: var(--accent);
			font-family: 'Share Tech Mono', monospace;
			font-size: 0.9rem;
			padding: 0.75rem 0.75rem;
			cursor: pointer;
			appearance: none;
			-webkit-appearance: none;
			min-width: 90px;
			text-align: center;
		}

		select option { background: var(--surface2); color: var(--text); }

		.results-section { margin-bottom: 2rem; }

		.section-label {
			font-size: 0.7rem;
			text-transform: uppercase;
			letter-spacing: 0.12em;
			color: var(--muted);
			margin-bottom: 0.75rem;
			padding-bottom: 0.4rem;
			border-bottom: 1px solid var(--border);
		}

		.results-grid {
			display: grid;
			grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
			gap: 0.5rem;
		}

		.result-row {
			background: var(--surface);
			border: 1px solid var(--border);
			border-radius: 6px;
			padding: 0.75rem 1rem;
			display: flex;
			flex-direction: column;
			gap: 0.2rem;
			cursor: pointer;
			transition: all 0.15s;
			position: relative;
		}

		.result-row:hover { border-color: var(--accent); background: var(--highlight); }

		.result-row.active-unit {
			border-color: var(--accent);
			background: var(--highlight);
		}

		.result-row.active-unit::before {
			content: '';
			position: absolute;
			left: 0; top: 0; bottom: 0;
			width: 3px;
			background: var(--accent);
			border-radius: 6px 0 0 6px;
		}

		.result-unit {
			font-size: 0.7rem;
			color: var(--muted);
			font-weight: 600;
			text-transform: uppercase;
			letter-spacing: 0.08em;
		}

		.result-value {
			font-family: 'Share Tech Mono', monospace;
			font-size: 1.05rem;
			color: var(--text);
			word-break: break-all;
		}

		.result-row.active-unit .result-value { color: var(--accent2); }

		.copy-hint {
			font-size: 0.6rem;
			color: transparent;
			transition: color 0.15s;
		}

		.result-row:hover .copy-hint { color: var(--muted); }

		.copy-hint.flash { color: var(--accent) !important; }

		.info-bar {
			background: var(--surface);
			border: 1px solid var(--border);
			border-radius: 6px;
			padding: 0.75rem 1rem;
			font-size: 0.8rem;
			color: var(--muted);
			display: flex;
			flex-wrap: wrap;
			gap: 1.5rem;
			margin-bottom: 2rem;
		}

		.info-item strong { color: var(--accent3); }

		.toggle-row {
			display: flex;
			align-items: center;
			gap: 1rem;
			margin-bottom: 1.5rem;
		}

		.toggle-label { font-size: 0.8rem; color: var(--muted); }

		.toggle {
			display: flex;
			background: var(--surface);
			border: 1px solid var(--border);
			border-radius: 4px;
			overflow: hidden;
		}

		.toggle button {
			padding: 0.25rem 0.75rem;
			font-family: 'Exo 2', sans-serif;
			font-size: 0.75rem;
			background: none;
			border: none;
			color: var(--muted);
			cursor: pointer;
			transition: all 0.15s;
		}

		.toggle button.active {
			background: var(--accent);
			color: #111;
			font-weight: 600;
		}

		@media (max-width: 600px) {
			.input-row { flex-direction: column; }
			.results-grid { grid-template-columns: 1fr 1fr; }
			header { align-items: flex-start; }
		}
	</style>
</head>
<body>
	<div class="container">
		<header>
			<div>
				<h1>Data Size Converter</h1>
				<p class="subtitle">Storage, memory, and bandwidth conversions</p>
			</div>
			<div class="mode-tabs">
				<button class="mode-tab active" onclick="setMode('storage')">Storage</button>
				<button class="mode-tab" onclick="setMode('bitrate')">Bitrate</button>
			</div>
		</header>

		<div class="input-row">
			<div class="input-wrap">
				<input type="number" id="numInput" placeholder="1024" value="" autofocus>
				<select id="unitSelect" onchange="convert()"></select>
			</div>
		</div>

		<div class="toggle-row" id="prefixToggle">
			<span class="toggle-label">Prefix standard:</span>
			<div class="toggle">
				<button id="btnDecimal" class="active" onclick="setPrefix('decimal')">Decimal (SI)</button>
				<button id="btnBinary" onclick="setPrefix('binary')">Binary (IEC)</button>
			</div>
		</div>

		<div class="info-bar" id="infoBar" style="display:none"></div>

		<div class="results-section">
			<div class="section-label" id="resultsLabel">Results</div>
			<div class="results-grid" id="resultsGrid"></div>
		</div>
	</div>

	<script>
		const STORAGE_DECIMAL = [
			{ key: 'b',   label: 'Bits',     factor: 0.125 },
			{ key: 'B',   label: 'Bytes',    factor: 1 },
			{ key: 'KB',  label: 'Kilobytes (KB)', factor: 1e3 },
			{ key: 'MB',  label: 'Megabytes (MB)', factor: 1e6 },
			{ key: 'GB',  label: 'Gigabytes (GB)', factor: 1e9 },
			{ key: 'TB',  label: 'Terabytes (TB)', factor: 1e12 },
			{ key: 'PB',  label: 'Petabytes (PB)', factor: 1e15 },
			{ key: 'EB',  label: 'Exabytes (EB)',  factor: 1e18 },
		];

		const STORAGE_BINARY = [
			{ key: 'b',   label: 'Bits',       factor: 0.125 },
			{ key: 'B',   label: 'Bytes',      factor: 1 },
			{ key: 'KiB', label: 'Kibibytes (KiB)', factor: 1024 },
			{ key: 'MiB', label: 'Mebibytes (MiB)', factor: 1024**2 },
			{ key: 'GiB', label: 'Gibibytes (GiB)', factor: 1024**3 },
			{ key: 'TiB', label: 'Tebibytes (TiB)', factor: 1024**4 },
			{ key: 'PiB', label: 'Pebibytes (PiB)', factor: 1024**5 },
			{ key: 'EiB', label: 'Exbibytes (EiB)', factor: 1024**6 },
		];

		const BITRATE = [
			{ key: 'bps',  label: 'Bits/sec (bps)',   factor: 1 },
			{ key: 'Kbps', label: 'Kilobits/sec (Kbps)', factor: 1e3 },
			{ key: 'Mbps', label: 'Megabits/sec (Mbps)', factor: 1e6 },
			{ key: 'Gbps', label: 'Gigabits/sec (Gbps)', factor: 1e9 },
			{ key: 'Tbps', label: 'Terabits/sec (Tbps)', factor: 1e12 },
			{ key: 'Bps',  label: 'Bytes/sec (Bps)',  factor: 8 },
			{ key: 'KBps', label: 'Kilobytes/sec (KBps)', factor: 8e3 },
			{ key: 'MBps', label: 'Megabytes/sec (MBps)', factor: 8e6 },
			{ key: 'GBps', label: 'Gigabytes/sec (GBps)', factor: 8e9 },
		];

		let mode = 'storage';
		let prefix = 'decimal';
		let units = STORAGE_DECIMAL;

		function setMode(m) {
			mode = m;
			document.querySelectorAll('.mode-tab').forEach((t, i) => {
				t.classList.toggle('active', (i === 0 && m === 'storage') || (i === 1 && m === 'bitrate'));
			});
			document.getElementById('prefixToggle').style.display = m === 'storage' ? 'flex' : 'none';
			updateUnits();
		}

		function setPrefix(p) {
			prefix = p;
			document.getElementById('btnDecimal').classList.toggle('active', p === 'decimal');
			document.getElementById('btnBinary').classList.toggle('active', p === 'binary');
			updateUnits();
		}

		function updateUnits() {
			if (mode === 'bitrate') units = BITRATE;
			else units = prefix === 'binary' ? STORAGE_BINARY : STORAGE_DECIMAL;
			const sel = document.getElementById('unitSelect');
			const prev = sel.value;
			sel.innerHTML = units.map(u => `<option value="${u.key}">${u.key}</option>`).join('');
			// Try to preserve selection or default to a sensible unit
			const defaults = { storage: 'MB', bitrate: 'Mbps' };
			const found = units.find(u => u.key === prev);
			sel.value = found ? found.key : (units.find(u => u.key === defaults[mode])?.key || units[2].key);
			convert();
		}

		function formatNum(n) {
			if (n === 0) return '0';
			const abs = Math.abs(n);
			if (abs >= 1e15) return n.toExponential(4);
			if (abs < 0.0001 && abs > 0) return n.toExponential(4);
			// Use up to 10 significant digits, strip trailing zeros
			let s = n.toPrecision(10).replace(/\.?0+$/, '');
			// Add thousands separators for large integers
			if (!s.includes('.') && !s.includes('e') && s.length > 6) {
				s = Number(s).toLocaleString('en-US');
			}
			return s;
		}

		function convert() {
			const raw = document.getElementById('numInput').value;
			const grid = document.getElementById('resultsGrid');
			const infoBar = document.getElementById('infoBar');

			if (raw === '' || isNaN(raw)) {
				grid.innerHTML = '<div style="color:var(--muted);font-size:0.85rem;padding:1rem">Enter a value above</div>';
				infoBar.style.display = 'none';
				return;
			}

			const n = parseFloat(raw);
			const selUnit = document.getElementById('unitSelect').value;
			const fromUnit = units.find(u => u.key === selUnit);
			if (!fromUnit) return;

			// Convert to base (bytes for storage, bps for bitrate)
			const baseValue = n * fromUnit.factor;

			grid.innerHTML = '';
			units.forEach(u => {
				const converted = baseValue / u.factor;
				const isActive = u.key === selUnit;
				const row = document.createElement('div');
				row.className = 'result-row' + (isActive ? ' active-unit' : '');
				row.title = 'Click to copy';
				row.innerHTML = `
					<span class="result-unit">${u.label}</span>
					<span class="result-value">${formatNum(converted)}</span>
					<span class="copy-hint" id="hint-${u.key}">click to copy</span>
				`;
				row.addEventListener('click', () => {
					navigator.clipboard.writeText(formatNum(converted)).then(() => {
						const hint = document.getElementById('hint-' + u.key);
						hint.textContent = 'copied!';
						hint.classList.add('flash');
						setTimeout(() => {
							hint.textContent = 'click to copy';
							hint.classList.remove('flash');
						}, 1200);
					});
				});
				grid.appendChild(row);
			});

			// Info bar for storage mode
			if (mode === 'storage') {
				const bytes = baseValue;
				const bits = bytes * 8;
				infoBar.style.display = 'flex';
				infoBar.innerHTML = `
					<span><strong>${formatNum(bytes)}</strong> bytes total</span>
					<span><strong>${formatNum(bits)}</strong> bits total</span>
					${bytes >= 1 ? `<span>≈ <strong>${formatNum(Math.round(bytes / 512))}</strong> 512B sectors</span>` : ''}
					${bytes >= 1e6 ? `<span>≈ <strong>${formatNum((bytes / 1.44e6).toFixed(1))}</strong> floppy disks</span>` : ''}
				`;
			} else {
				const bps = baseValue;
				const secondsFor1GB = (1e9 * 8) / bps;
				infoBar.style.display = 'flex';
				if (secondsFor1GB < 3600 * 24) {
					const h = Math.floor(secondsFor1GB / 3600);
					const m = Math.floor((secondsFor1GB % 3600) / 60);
					const s = Math.floor(secondsFor1GB % 60);
					const timeStr = h ? `${h}h ${m}m ${s}s` : m ? `${m}m ${s}s` : `${s}s`;
					infoBar.innerHTML = `<span>Time to transfer <strong>1 GB</strong> at this rate: <strong>${timeStr}</strong></span>`;
				} else {
					infoBar.innerHTML = `<span>Time to transfer <strong>1 GB</strong>: <strong>${formatNum((secondsFor1GB / 3600).toFixed(1))} hours</strong></span>`;
				}
			}
		}

		document.getElementById('numInput').addEventListener('input', convert);
		document.getElementById('unitSelect').addEventListener('change', convert);

		// Init
		updateUnits();
		document.getElementById('numInput').value = '1';
		document.getElementById('unitSelect').value = 'GB';
		convert();
	</script>
	<script src="assets/shared-nav.js"></script>
</body>
</html>
